<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password | PickUpPulse</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      color: #1e293b;
    }

    .recovery-box {
      width: 100%;
      max-width: 440px;
      padding: 38px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      text-align: center;
      color: #0f172a;
    }

    .description {
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.5;
      color: #475569;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
    }

    input:focus {
      outline: 2px solid #38bdf8;
      border-color: #0284c7;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #0284c7;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #0369a1;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #message {
      display: none;
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      line-height: 1.4;
    }

    #message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    #message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .back-link {
      margin-top: 22px;
      text-align: center;
    }

    .back-link a {
      color: #0284c7;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main class="recovery-box">
    <h1>Reset your password</h1>

    <p class="description">
      Enter the email address connected to your PickUpPulse account.
      We will send you a secure password-reset link.
    </p>

    <form id="recoveryForm">
      <label for="email">Email address</label>

      <input
        type="email"
        id="email"
        autocomplete="email"
        required
      >

      <button type="submit" id="submitButton">
        Send reset link
      </button>
    </form>

    <div id="message" role="status" aria-live="polite"></div>

    <div class="back-link">
      <a href="login.html">Return to login</a>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://pthjwhhaupyswopadmsv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0aGp3aGhhdXB5c3dvcGFkbXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjgzMTcsImV4cCI6MjA5MTQ0NDMxN30.oSFyNIf3pr9_Nbc8vG4pr9OGU7ufUJgEpW6eQNCwtYs";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const recoveryForm = document.getElementById("recoveryForm");
    const emailInput = document.getElementById("email");
    const submitButton = document.getElementById("submitButton");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = type;
    }

    recoveryForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim().toLowerCase();

      if (!email) {
        showMessage("Please enter your email address.", "error");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Sending...";
      messageBox.className = "";
      messageBox.style.display = "none";

      try {
        const redirectUrl =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1"
            ? `${window.location.origin}/update-password.html`
            : "https://getpickuppulse.com/update-password.html";

        const { error } =
          await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: redirectUrl
          });

        if (error) {
          throw error;
        }

        /*
         * Use a neutral response so the page does not reveal whether
         * a particular email address has a PickUpPulse account.
         */
        showMessage(
          "If an account exists for that email address, a password-reset link has been sent. Please check your inbox and spam folder.",
          "success"
        );

        recoveryForm.reset();
      } catch (error) {
        console.error("Password recovery error:", error);

        showMessage(
          error.message || "The reset email could not be sent. Please try again.",
          "error"
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Send reset link";
      }
    });
  </script>
</body>
</html>
