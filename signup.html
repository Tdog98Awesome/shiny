<script>
    const SUPABASE_URL =
        "https://pthjwhhaupyswopadmsv.supabase.co";

    const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0aGp3aGhhdXB5c3dvcGFkbXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjgzMTcsImV4cCI6MjA5MTQ0NDMxN30.oSFyNIf3pr9_Nbc8vG4pr9OGU7ufUJgEpW6eQNCwtYs";

    const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );

    const signupForm =
        document.getElementById("signupForm");

    const signupButton =
        document.getElementById("signupButton");

    const messageBox =
        document.getElementById("message");

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = type;
    }

    function clearMessage() {
        messageBox.textContent = "";
        messageBox.className = "";
        messageBox.style.display = "none";
    }

    signupForm.addEventListener(
        "submit",
        async function(event) {
            event.preventDefault();

            clearMessage();

            const schoolName =
                document
                    .getElementById("school_name")
                    .value
                    .trim();

            const adminName =
                document
                    .getElementById("admin_name")
                    .value
                    .trim();

            const email =
                document
                    .getElementById("email")
                    .value
                    .trim()
                    .toLowerCase();

            const phone =
                document
                    .getElementById("phone")
                    .value
                    .trim();

            const password =
                document
                    .getElementById("password")
                    .value;

            const confirmPassword =
                document
                    .getElementById("confirm_password")
                    .value;

            if (!schoolName) {
                showMessage(
                    "Please enter the school name.",
                    "error"
                );
                return;
            }

            if (!adminName) {
                showMessage(
                    "Please enter the administrator name.",
                    "error"
                );
                return;
            }

            if (!email) {
                showMessage(
                    "Please enter an email address.",
                    "error"
                );
                return;
            }

            if (password.length < 8) {
                showMessage(
                    "Your password must contain at least 8 characters.",
                    "error"
                );
                return;
            }

            if (password !== confirmPassword) {
                showMessage(
                    "Passwords do not match.",
                    "error"
                );
                return;
            }

            signupButton.disabled = true;
            signupButton.textContent =
                "Creating Account...";

            showMessage(
                "Creating your account and school registration...",
                "info"
            );

            try {
                const emailRedirectUrl =
                    window.location.origin + "/login.html";

                const { data, error } =
                    await supabaseClient.auth.signUp({
                        email: email,
                        password: password,

                        options: {
                            emailRedirectTo:
                                emailRedirectUrl,

                            data: {
                                signup_type:
                                    "school_registration",

                                school_name:
                                    schoolName,

                                admin_name:
                                    adminName,

                                phone:
                                    phone
                            }
                        }
                    });

                if (error) {
                    throw error;
                }

                if (!data || !data.user) {
                    throw new Error(
                        "Supabase did not return a new user account."
                    );
                }

                console.log(
                    "New Auth user:",
                    data.user
                );

                console.log(
                    "Saved user metadata:",
                    data.user.user_metadata
                );

                signupForm.reset();

                showMessage(
                    "Account created successfully. " +
                    "Please check your email for a verification message. " +
                    "Your school will remain pending until approved by PickUpPulse.",
                    "success"
                );

                signupButton.textContent =
                    "Account Created";
            }
            catch (error) {
                console.error(
                    "School signup error:",
                    error
                );

                let errorMessage =
                    error?.message ||
                    "The account could not be created. Please try again.";

                const lowerMessage =
                    errorMessage.toLowerCase();

                if (
                    lowerMessage.includes("already registered") ||
                    lowerMessage.includes("already exists") ||
                    lowerMessage.includes("user already registered")
                ) {
                    errorMessage =
                        "An account already exists for this email address.";
                }

                showMessage(
                    errorMessage,
                    "error"
                );

                signupButton.disabled = false;
                signupButton.textContent =
                    "Create Account";
            }
        }
    );
</script>
