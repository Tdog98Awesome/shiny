<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Choose New Password | PickUpPulse</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      color: #1e293b;
    }

    .password-box {
      width: 100%;
      max-width: 440px;
      padding: 38px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      text-align: center;
      color: #0f172a;
    }

    .description {
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.5;
      color: #475569;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
    }

    input:focus {
      outline: 2px solid #38bdf8;
      border-color: #0284c7;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #0284c7;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #0369a1;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #message {
      display: none;
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      line-height: 1.4;
    }

    #message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    #message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    #expiredMessage {
      display: none;
      padding: 14px;
      border-radius: 10px;
      background: #fee2e2;
      color: #991b1b;
      line-height: 1.5;
    }

    .back-link {
      margin-top: 22px;
      text-align: center;
    }

    .back-link a {
      color: #0284c7;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main class="password-box">
    <h1>Choose a new password</h1>

    <p class="description">
      Enter and confirm the new password for your PickUpPulse account.
    </p>

    <div id="expiredMessage">
      This password-reset link is invalid or has expired.
      Please request another reset email.
      <div class="back-link">
        <a href="forgot-password.html">Request another link</a>
      </div>
    </div>

    <form id="passwordForm" style="display: none;">
      <div class="field">
        <label for="newPassword">New password</label>

        <input
          type="password"
          id="newPassword"
          minlength="8"
          autocomplete="new-password"
          required
        >
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm new password</label>

        <input
          type="password"
          id="confirmPassword"
          minlength="8"
          autocomplete="new-password"
          required
        >
      </div>

      <button type="submit" id="submitButton">
        Update password
      </button>
    </form>

    <div id="message" role="status" aria-live="polite"></div>

    <div class="back-link">
      <a href="login.html">Return to login</a>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://pthjwhhaupyswopadmsv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0aGp3aGhhdXB5c3dvcGFkbXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjgzMTcsImV4cCI6MjA5MTQ0NDMxN30.oSFyNIf3pr9_Nbc8vG4pr9OGU7ufUJgEpW6eQNCwtYs";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const passwordForm = document.getElementById("passwordForm");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput =
      document.getElementById("confirmPassword");
    const submitButton = document.getElementById("submitButton");
    const messageBox = document.getElementById("message");
    const expiredMessage = document.getElementById("expiredMessage");

    let recoverySessionAvailable = false;

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = type;
    }

    function showPasswordForm() {
      recoverySessionAvailable = true;
      expiredMessage.style.display = "none";
      passwordForm.style.display = "block";
    }

    function showExpiredMessage() {
      recoverySessionAvailable = false;
      passwordForm.style.display = "none";
      expiredMessage.style.display = "block";
    }

    /*
     * Register this listener immediately after creating the client.
     * Supabase emits PASSWORD_RECOVERY when the email link creates
     * the temporary recovery session.
     */
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" && session) {
        showPasswordForm();
      }

      if (event === "SIGNED_IN" && session) {
        showPasswordForm();
      }
    });

    async function checkRecoverySession() {
      try {
        const {
          data: { session },
          error
        } = await supabaseClient.auth.getSession();

        if (error) {
          throw error;
        }

        if (session) {
          showPasswordForm();
          return;
        }

        /*
         * Give Supabase a short opportunity to process the recovery
         * information from the URL before treating the link as invalid.
         */
        setTimeout(async () => {
          const {
            data: { session: delayedSession }
          } = await supabaseClient.auth.getSession();

          if (delayedSession) {
            showPasswordForm();
          } else {
            showExpiredMessage();
          }
        }, 1200);
      } catch (error) {
        console.error("Recovery session error:", error);
        showExpiredMessage();
      }
    }

    passwordForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!recoverySessionAvailable) {
        showExpiredMessage();
        return;
      }

      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (newPassword.length < 8) {
        showMessage(
          "Your password must contain at least 8 characters.",
          "error"
        );
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("The passwords do not match.", "error");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Updating...";

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) {
          throw error;
        }

        showMessage(
          "Your password has been updated. You can now return to the login page.",
          "success"
        );

        passwordForm.reset();
        passwordForm.style.display = "none";

        /*
         * End the temporary recovery session. The user will log in
         * normally with the new password.
         */
        await supabaseClient.auth.signOut();

        setTimeout(() => {
          window.location.href = "login.html?passwordReset=success";
        }, 1800);
      } catch (error) {
        console.error("Password update error:", error);

        showMessage(
          error.message || "Your password could not be updated.",
          "error"
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Update password";
      }
    });

    checkRecoverySession();
  </script>
</body>
</html>
