<!DOCTYPE html>
<html>
<head>
  <title>Create Pickup Cards - PickUpPulse</title>
</head>
<body>
  <h1>Create Parent Pickup Cards</h1>

  <form action="https://pickuppulse-card-generator.onrender.com/generate-cards"
        method="POST"
        enctype="multipart/form-data">

    <label>Select Students CSV:</label><br><br>

    <input type="file" name="csv_file" accept=".csv" required>

    <br><br>

    <button type="submit">Create Pickup Cards PDF</button>
  </form>
</body>
