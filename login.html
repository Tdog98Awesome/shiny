  <script>
    const SUPABASE_URL =
      "https://pthjwhhaupyswopadmsv.supabase.co";

    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0aGp3aGhhdXB5c3dvcGFkbXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjgzMTcsImV4cCI6MjA5MTQ0NDMxN30.oSFyNIf3pr9_Nbc8vG4pr9OGU7ufUJgEpW6eQNCwtYs";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const loginButton = document.getElementById("loginButton");

    function showMessage(text, color) {
      message.innerText = text;
      message.style.color = color;
    }

    function resetLoginButton() {
      loginButton.innerText = "Login";
      loginButton.disabled = false;
    }

    async function signOutAndReset() {
      await supabaseClient.auth.signOut();
      resetLoginButton();
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      showMessage("", "");
      loginButton.innerText = "Logging in...";
      loginButton.disabled = true;

      const email = document
        .getElementById("email")
        .value
        .trim()
        .toLowerCase();

      const password = document.getElementById("password").value;

      try {
        const { data, error } =
          await supabaseClient.auth.signInWithPassword({
            email,
            password
          });

        if (error) {
          showMessage(error.message, "red");
          resetLoginButton();
          return;
        }

        if (!data.user) {
          showMessage(
            "Login failed because no user account was returned.",
            "red"
          );

          await signOutAndReset();
          return;
        }

        const userId = data.user.id;

        const {
          data: profile,
          error: profileError
        } = await supabaseClient
          .from("profiles")
          .select("role, school_id")
          .eq("id", userId)
          .single();

        if (profileError || !profile) {
          console.error("Profile lookup error:", profileError);

          showMessage(
            "Login worked, but no profile or role was found.",
            "red"
          );

          await signOutAndReset();
          return;
        }

        const role = profile.role;

        const validRoles = [
          "super_admin",
          "school_admin",
          "pickup_staff"
        ];

        if (!validRoles.includes(role)) {
          showMessage(
            "Unknown role: " + String(role),
            "red"
          );

          await signOutAndReset();
          return;
        }

        /*
          School administrators and pickup staff must:
          1. Be assigned to a school.
          2. Belong to an approved school.
          3. Belong to a school with active payment.
        */
        if (
          role === "school_admin" ||
          role === "pickup_staff"
        ) {
          if (!profile.school_id) {
            showMessage(
              "Your account is not assigned to a school.",
              "red"
            );

            await signOutAndReset();
            return;
          }

          const {
            data: school,
            error: schoolError
          } = await supabaseClient
            .from("schools")
            .select("approved, payment_status")
            .eq("id", profile.school_id)
            .single();

          if (schoolError || !school) {
            console.error(
              "School verification error:",
              schoolError
            );

            showMessage(
              "Could not verify your school's account status.",
              "red"
            );

            await signOutAndReset();
            return;
          }

          if (school.approved !== true) {
            showMessage(
              "Your school account is pending approval.",
              "orange"
            );

            await signOutAndReset();
            return;
          }

          if (school.payment_status !== "paid") {
            showMessage(
              role === "school_admin"
                ? "Your school account is not active yet. Please complete payment."
                : "Your school's PickUpPulse account is not currently active. Please contact your school administrator.",
              "red"
            );

            await signOutAndReset();
            return;
          }
        }

        /*
          Route users based on their exact role value.
        */
        if (role === "super_admin") {
          window.location.href =
            "superadmin-dashboard.html";
          return;

        if (role === "school_admin") {
          window.location.href =
            "school-admin-dashboard.html";
          return;

        if (role === "pickup_staff") {
          window.location.href = "scanner.html";
          return;
        }

        console.error(
          "Unexpected login error:",
          unexpectedError
        );

        showMessage(
          "An unexpected error occurred while logging in.",
          "red"
        );

        await supabaseClient.auth.signOut();
        resetLoginButton();
      }
    });
  </script>
